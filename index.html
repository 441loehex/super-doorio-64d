<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portalkeep Blaster</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="startOverlay" class="overlay visible">
    <div class="panel">
      <h1>Portalkeep Blaster</h1>
      <p>A whimsical raycast FPS adventure through painted worlds.</p>
      <h2>Controls</h2>
      <ul>
        <li>Move: <strong>WASD</strong></li>
        <li>Look: <strong>Mouse</strong></li>
        <li>Shoot: <strong>Left Click</strong></li>
        <li>Interact: <strong>E</strong></li>
        <li>Switch Weapon: <strong>Mouse Wheel / 1-9</strong></li>
        <li>Pause: <strong>Esc</strong></li>
      </ul>
      <button id="startBtn">Start Adventure</button>
      <button id="resetSaveBtn">Reset Save</button>
    </div>
  </div>

  <canvas id="gameCanvas" width="1280" height="720"></canvas>

  <div id="hud" class="hud"></div>

  <div id="pauseMenu" class="overlay">
    <div class="panel">
      <h2>Paused</h2>
      <label>Mouse Sensitivity <input id="sensitivity" type="range" min="0.001" max="0.01" step="0.0005" /></label>
      <label>Volume <input id="volume" type="range" min="0" max="1" step="0.05" /></label>
      <button id="resumeBtn">Resume</button>
      <button id="controlsBtn">Controls</button>
      <button id="hubBtn">Return to Hub</button>
    </div>
  </div>

  <div id="controlsPanel" class="overlay">
    <div class="panel">
      <h2>Controls / Keybinds</h2>
      <div id="keybinds"></div>
      <button id="closeControlsBtn">Close</button>
    </div>
  </div>

  <div id="message" class="message"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
